name: Contracts Boundary Check

on:
  pull_request:
    paths:
      - packages/contracts/**
      - scripts/check-contract-boundaries.js
      - .github/workflows/contracts-check.yml
  push:
    branches:
      - main
    paths:
      - packages/contracts/**
      - scripts/check-contract-boundaries.js
      - .github/workflows/contracts-check.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-contracts:
    name: Check contracts boundaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify contracts boundaries
        run: node scripts/check-contract-boundaries.js
